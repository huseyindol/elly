# ============================================
# HPA - Base Pod'lar İçin (elly-app)
# ============================================
# K3s varsayılan olarak Metrics Server ile GELMEZ.
# HPA'nın çalışması için Metrics Server kurulmalıdır:
#   kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
#
# Base pod'lar sabit 2 replika çalışır (HPA ile ölçeklenmez).
# Yoğun trafik olunca burst pod'lar devreye girer.
#
# Doğrulama:
#   kubectl get hpa -n elly
#   kubectl describe hpa elly-burst-hpa -n elly

---
# ============================================
# HPA - Burst Pod'lar İçin (elly-app-burst)
# ============================================
# Normal durumda 0 pod çalışır.
# CPU yükü artınca 1→3 burst pod açılır (512MB'lık hafif pod'lar).
# CPU düşünce burst pod'lar tekrar 0'a iner.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: elly-burst-hpa
  namespace: elly
  labels:
    app: elly-cms
    component: autoscaling
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: elly-app-burst          # Hedef: Burst Deployment
  minReplicas: 1                  # K8s minimum 1 gerektirir (0 olamaz)
  maxReplicas: 3                  # Tek VM için max 3 burst pod (3 × 512MB = 1.5GB)
  metrics:
    # Base pod'ların CPU kullanımına göre ölçekleme
    - type: Object
      object:
        describedObject:
          apiVersion: apps/v1
          kind: Deployment
          name: elly-app           # Base pod'ların CPU'sunu izle
        metric:
          name: cpu
        target:
          type: AverageValue
          averageValue: "700m"     # Base pod'lar ortalama %70 CPU geçince

    # Burst pod'ların kendi CPU'su da kontrol edilir
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

  behavior:
    # Scale Up: Hızlı ölçeklen (trafik ani artabilir)
    scaleUp:
      stabilizationWindowSeconds: 30    # 30 saniye bekle, sonra scale up
      policies:
        - type: Pods
          value: 1                       # Aynı anda max 1 pod ekle
          periodSeconds: 60

    # Scale Down: Yavaş küçül (flapping'i önle)
    scaleDown:
      stabilizationWindowSeconds: 300    # 5 dakika bekle, sonra scale down
      policies:
        - type: Pods
          value: 1                       # Aynı anda max 1 pod sil
          periodSeconds: 120

# ============================================
# NASIL ÇALIŞIR?
# ============================================
#
# Normal trafik:
#   ┌──────────┐ ┌──────────┐
#   │ Base Pod1│ │ Base Pod2│     2 × 1GB = 2GB
#   │  1GB     │ │  1GB     │     Burst: 0 pod
#   └──────────┘ └──────────┘
#
# Yoğun trafik (CPU > %70):
#   ┌──────────┐ ┌──────────┐ ┌────────┐
#   │ Base Pod1│ │ Base Pod2│ │Burst #1│  HPA otomatik açar
#   │  1GB     │ │  1GB     │ │ 512MB  │
#   └──────────┘ └──────────┘ └────────┘
#
# Çok yoğun trafik:
#   ┌──────────┐ ┌──────────┐ ┌────────┐ ┌────────┐ ┌────────┐
#   │ Base Pod1│ │ Base Pod2│ │Burst #1│ │Burst #2│ │Burst #3│
#   │  1GB     │ │  1GB     │ │ 512MB  │ │ 512MB  │ │ 512MB  │
#   └──────────┘ └──────────┘ └────────┘ └────────┘ └────────┘
#   Toplam: 2GB + 1.5GB = 3.5GB app memory
#
# Trafik düşünce (5dk cooldown):
#   Burst pod'lar birer birer kapanır → tekrar 2 base pod kalır
