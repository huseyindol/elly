# ============================================
# SECRET TEMPLATE - CI/CD Tarafından Doldurulur
# ============================================
# Bu dosya Git'e gönderilir. Gerçek değerler ${VARIABLE} placeholder'larıdır.
# CI/CD pipeline'da envsubst ile gerçek değerler inject edilir:
#   envsubst < 1-secret.template.yaml > 1-secret.yaml
#
# Değerler GitHub Secrets'ten alınır ve base64 encode edilmiş olmalıdır.
apiVersion: v1
kind: Secret
metadata:
  name: elly-secret
  namespace: elly
  labels:
    app: elly-cms
    component: secret
type: Opaque
data:
  # --- Database Credentials ---
  TENANT1_DB_USER: "${TENANT1_DB_USER_B64}"
  TENANT1_DB_PASSWORD: "${TENANT1_DB_PASSWORD_B64}"
  TENANT2_DB_USER: "${TENANT2_DB_USER_B64}"
  TENANT2_DB_PASSWORD: "${TENANT2_DB_PASSWORD_B64}"

  # --- JWT Secrets ---
  JWT_SECRET: "${JWT_SECRET_B64}"
  JWT_ENCRYPTION_SECRET: "${JWT_ENCRYPTION_SECRET_B64}"

  # --- OAuth2 Client Secrets ---
  GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID_B64}"
  GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET_B64}"
  FACEBOOK_CLIENT_ID: "${FACEBOOK_CLIENT_ID_B64}"
  FACEBOOK_CLIENT_SECRET: "${FACEBOOK_CLIENT_SECRET_B64}"
  GH_OAUTH_CLIENT_ID: "${GH_OAUTH_CLIENT_ID_B64}"
  GH_OAUTH_CLIENT_SECRET: "${GH_OAUTH_CLIENT_SECRET_B64}"

  # --- Redis ---
  REDIS_PASSWORD: "${REDIS_PASSWORD_B64}"

  # --- Email API Key ---
  EMAIL_API_KEY: "${EMAIL_API_KEY_B64}"

---
# ============================================
# SECRET - PostgreSQL Tenant 1
# ============================================
apiVersion: v1
kind: Secret
metadata:
  name: postgres-tenant1-secret
  namespace: elly
  labels:
    app: elly-cms
    component: database
    tenant: tenant1
type: Opaque
data:
  POSTGRES_USER: "${TENANT1_DB_USER_B64}"
  POSTGRES_PASSWORD: "${TENANT1_DB_PASSWORD_B64}"

---
# ============================================
# SECRET - PostgreSQL Tenant 2
# ============================================
apiVersion: v1
kind: Secret
metadata:
  name: postgres-tenant2-secret
  namespace: elly
  labels:
    app: elly-cms
    component: database
    tenant: tenant2
type: Opaque
data:
  POSTGRES_USER: "${TENANT2_DB_USER_B64}"
  POSTGRES_PASSWORD: "${TENANT2_DB_PASSWORD_B64}"
