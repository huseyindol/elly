# ============================================
# STATEFULSET - Redis (Tenant-Aware Cache)
# ============================================
# Tüm tenant'lar tek Redis instance üzerinden key prefix ile izole edilir.
# Key formatı: tenantId::cacheName::key (örnek: tenant1::pages::slug_home)
# maxmemory-policy: allkeys-lru (en az kullanılan key silinir)
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: elly
  labels:
    app: elly-cms
    component: cache
spec:
  serviceName: redis
  replicas: 1
  selector:
    matchLabels:
      app: elly-cms
      component: cache
  template:
    metadata:
      labels:
        app: elly-cms
        component: cache
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          command:
            - redis-server
            - "--appendonly"
            - "yes"
            - "--maxmemory"
            - "256mb"
            - "--maxmemory-policy"
            - "allkeys-lru"
            - "--requirepass"
            - "$(REDIS_PASSWORD)"
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: elly-secret
                  key: REDIS_PASSWORD
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          volumeMounts:
            - name: redis-data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: redis-data
        labels:
          app: elly-cms
          component: cache
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: local-path
        resources:
          requests:
            storage: 1Gi
