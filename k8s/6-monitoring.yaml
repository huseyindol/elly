# ============================================
# MONITORING & OBSERVABILITY
# ============================================
# Tüm monitoring bileşenleri bu dosyada.
# kubectl apply -f k8s/ ile otomatik deploy edilir.
#
# Bileşenler:
#   - Zipkin (Distributed Tracing) → localhost:9411
#   - Prometheus (Metrics) → localhost:9090
#   - Grafana (Dashboard) → localhost:3000

---
# ============================================
# DEPLOYMENT - Zipkin (Distributed Tracing)
# ============================================
# Spring Boot uygulamasından gelen trace'leri toplar.
# ZIPKIN_URL env var ile app'e bağlanır.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zipkin
  namespace: elly
  labels:
    app: elly-cms
    component: tracing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: elly-cms
      component: tracing
  template:
    metadata:
      labels:
        app: elly-cms
        component: tracing
    spec:
      containers:
        - name: zipkin
          image: openzipkin/zipkin:latest
          ports:
            - containerPort: 9411
              name: http
          env:
            - name: STORAGE_TYPE
              value: "mem"
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20

---
# ============================================
# CONFIGMAP - Prometheus Konfigürasyonu
# ============================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: elly
  labels:
    app: elly-cms
    component: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      # Spring Boot Actuator metrikleri
      - job_name: 'elly-app'
        metrics_path: '/actuator/prometheus'
        scrape_interval: 15s
        static_configs:
          - targets: ['elly-app-service.elly.svc.cluster.local:8080']

      # Prometheus kendisi
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

---
# ============================================
# DEPLOYMENT - Prometheus (Metrics)
# ============================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: elly
  labels:
    app: elly-cms
    component: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: elly-cms
      component: monitoring
      tier: prometheus
  template:
    metadata:
      labels:
        app: elly-cms
        component: monitoring
        tier: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:latest
          ports:
            - containerPort: 9090
              name: http
          args:
            - '--config.file=/etc/prometheus/prometheus.yml'
            - '--storage.tsdb.path=/prometheus'
            - '--storage.tsdb.retention.time=7d'
            - '--web.console.libraries=/usr/share/prometheus/console_libraries'
            - '--web.console.templates=/usr/share/prometheus/consoles'
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus
            - name: prometheus-data
              mountPath: /prometheus
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: prometheus-config
          configMap:
            name: prometheus-config
        - name: prometheus-data
          emptyDir: {}    # Restart'ta veri kaybolur, PVC istersen eklenebilir

---
# ============================================
# SERVICE - Prometheus
# ============================================
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: elly
  labels:
    app: elly-cms
    component: monitoring
spec:
  selector:
    app: elly-cms
    component: monitoring
    tier: prometheus
  ports:
    - port: 9090
      targetPort: 9090
      name: http

---
# ============================================
# CONFIGMAP - Grafana Datasource + Dashboard
# ============================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasource
  namespace: elly
  labels:
    app: elly-cms
    component: monitoring
data:
  datasource.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: true

---
# ============================================
# DEPLOYMENT - Grafana (Dashboard)
# ============================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: elly
  labels:
    app: elly-cms
    component: monitoring
    tier: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: elly-cms
      component: monitoring
      tier: grafana
  template:
    metadata:
      labels:
        app: elly-cms
        component: monitoring
        tier: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:latest
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: "admin"
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "admin123"
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          volumeMounts:
            - name: grafana-datasource
              mountPath: /etc/grafana/provisioning/datasources
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: grafana-datasource
          configMap:
            name: grafana-datasource

---
# ============================================
# SERVICE - Grafana
# ============================================
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: elly
  labels:
    app: elly-cms
    component: monitoring
spec:
  selector:
    app: elly-cms
    component: monitoring
    tier: grafana
  ports:
    - port: 3000
      targetPort: 3000
      name: http

# ============================================
# GRAFANA DASHBOARD KURULUM
# ============================================
#
# 1. Grafana erişimi:
#    kubectl port-forward svc/grafana 3000:3000 -n elly &
#    http://localhost:3000 (admin / admin123)
#
# 2. Önerilen Dashboard'lar (Import → ID):
#
#    | Dashboard                      | ID    |
#    |--------------------------------|-------|
#    | Spring Boot 3.x Statistics     | 19004 |
#    | JVM (Micrometer)               | 4701  |
#    | HikariCP Connection Pool       | 6083  |
#
# 3. Import: Grafana → "+" → Import → ID gir → Load → Prometheus seç → Import
