# ============================================
# HPA - Burst Pod'lar (elly-app-burst)
# ============================================
#
# ⚠️  METRICS-SERVER ZORUNLU — kurulu değilse HPA ÇALIŞMAZ.
#     kubectl get hpa -n elly → TARGETS: <unknown> ise burst hep 0 pod kalır.
#     Yük altında otomatik pod açılmaz; manuel: kubectl scale deploy elly-app-burst -n elly --replicas=1
#
# 4GB VM profili:
#   - Base: elly-app replicas=1 (sabit, ~1Gi)
#   - Burst: idle 0 pod, yük gelince EN FAZLA 1 pod (~512Mi)
#   - Toplam app spike: ~1.5Gi
#
# Doğrulama:
#   kubectl get hpa -n elly
#   kubectl describe hpa elly-burst-hpa -n elly

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: elly-burst-hpa
  namespace: elly
  labels:
    app: elly-cms
    component: autoscaling
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: elly-app-burst
  minReplicas: 0                  # Idle: burst pod yok
  maxReplicas: 1                  # 4GB VM — yük altında EN FAZLA 1 burst pod
  metrics:
    # Base pod CPU > ~%70 olunca burst aç
    - type: Object
      object:
        describedObject:
          apiVersion: apps/v1
          kind: Deployment
          name: elly-app
        metric:
          name: cpu
        target:
          type: AverageValue
          averageValue: "700m"

    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 1                 # Tek seferde max 1 pod ekle
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120

# ============================================
# NASIL ÇALIŞIR? (4GB VM — metrics-server kuruluysa)
# ============================================
#
# Normal trafik:
#   ┌──────────┐
#   │ Base Pod │   1 × 1Gi, Burst: 0 pod
#   └──────────┘
#
# Yoğun trafik (base CPU > %70):
#   ┌──────────┐ ┌──────────┐
#   │ Base Pod │ │ Burst #1 │   HPA max 1 burst pod açar (512Mi)
#   └──────────┘ └──────────┘
#
# Trafik düşünce (5dk cooldown):
#   Burst pod kapanır → yine 1 base pod
#
# ⚠️  Chat: 2+ app pod → in-memory broker + sticky session yok → chat bozulabilir.
#     Burst sadece REST/API için güvenli; chat için sticky veya shared broker gerekir.
