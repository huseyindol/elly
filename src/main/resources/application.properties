spring.application.name=elly
server.port=${APP_PORT:8080}

# ============================================
# MULTI-TENANCY CONFIGURATION (Database-per-Tenant)
# ============================================
# Spring Boot auto DataSource devre dışı bırakıldı (DataSourceConfig yönetir)
# Her tenant için ayrı HikariCP connection pool oluşturulur.

# Default tenant (token olmayan istekler için kullanılır)
app.tenants.default-tenant=${DEFAULT_TENANT:basedb}

# --- BaseDB (Default) ---
app.tenants.datasources.basedb.url=jdbc:postgresql://${BASEDB_HOST:${DB_HOST:localhost}}:${BASEDB_PORT:${DB_PORT:5432}}/${BASEDB_NAME:elly_basedb}
app.tenants.datasources.basedb.username=${BASEDB_USER:postgres}
app.tenants.datasources.basedb.password=${BASEDB_PASSWORD:123456}
app.tenants.datasources.basedb.schema=${BASEDB_SCHEMA:public}

# --- Tenant 1 ---
app.tenants.datasources.tenant1.url=jdbc:postgresql://${TENANT1_DB_HOST:${DB_HOST:localhost}}:${TENANT1_DB_PORT:${DB_PORT:5432}}/${TENANT1_DB_NAME:elly_tenant1}
app.tenants.datasources.tenant1.username=${TENANT1_DB_USER:postgres}
app.tenants.datasources.tenant1.password=${TENANT1_DB_PASSWORD:123456}
app.tenants.datasources.tenant1.schema=${TENANT1_DB_SCHEMA:public}

# --- Tenant 2 ---
app.tenants.datasources.tenant2.url=jdbc:postgresql://${TENANT2_DB_HOST:${DB_HOST:localhost}}:${TENANT2_DB_PORT:${DB_PORT:5432}}/${TENANT2_DB_NAME:elly_tenant2}
app.tenants.datasources.tenant2.username=${TENANT2_DB_USER:postgres}
app.tenants.datasources.tenant2.password=${TENANT2_DB_PASSWORD:123456}
app.tenants.datasources.tenant2.schema=${TENANT2_DB_SCHEMA:public}

# Yeni tenant eklemek için:
# app.tenants.datasources.tenant3.url=jdbc:postgresql://...
# app.tenants.datasources.tenant3.username=...
# app.tenants.datasources.tenant3.password=...
# app.tenants.datasources.tenant3.schema=...

# ============================================
# JPA/HIBERNATE (DataSourceConfig & JpaConfig yönetir)
# ============================================
# Not: spring.datasource.* ve spring.jpa.* artık kullanılmıyor
# Tüm JPA ayarları JpaConfig.java içinde tanımlıdır.
#
# hbm2ddl.auto stratejisi (JpaConfig.java tüm tenant'lara uygular):
#   - update   : entity farklarini otomatik ALTER TABLE yapar (LOKAL)
#   - validate : sadece schema dogrular, degistirmez (PROD ONERILEN)
#   - none     : Hibernate hic dokunmaz
# Prod'da migration'lar manuel yonetilir, Hibernate'in ALTER TABLE yapmasi
# orphan constraint / beklenmedik degisikliklere yol acar.
app.jpa.ddl-auto=${JPA_DDL_AUTO:update}
spring.docker.compose.enabled=false

# ============================================
# SWAGGER / OPENAPI
# ============================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# ============================================
# FILE UPLOAD
# ============================================
file.upload.directory=assets/images
file.upload.directory.files=assets
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ============================================
# JWT CONFIGURATION
# ============================================
jwt.secret=${JWT_SECRET:mySecretKey123456789012345678901234567890}
jwt.encryption.secret=${JWT_ENCRYPTION_SECRET:myEncryptionKey123456789012345678901234567890}
# 30 dk (milisaniye)
jwt.expiration=1800000
# 60 dk (milisaniye)
jwt.refresh.expiration=3600000

# ============================================
# APPLICATION CONFIGURATION
# ============================================
app.timezone=Europe/Istanbul

# ============================================
# COOKIE CONFIGURATION
# ============================================
cookie.access-token.expiration=1800
cookie.refresh-token.expiration=3600
cookie.user-code.expiration=3600
cookie.secure=${COOKIE_SECURE:false}

# ============================================
# OAUTH2 CONFIGURATION
# ============================================
app.oauth2.redirect-uri=${OAUTH2_REDIRECT_URI:http://localhost:3000/oauth2/redirect}

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:YOUR_GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:YOUR_GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v2/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=sub

# Facebook OAuth2
spring.security.oauth2.client.registration.facebook.client-id=${FACEBOOK_CLIENT_ID:YOUR_FACEBOOK_APP_ID}
spring.security.oauth2.client.registration.facebook.client-secret=${FACEBOOK_CLIENT_SECRET:YOUR_FACEBOOK_APP_SECRET}
spring.security.oauth2.client.registration.facebook.scope=email,public_profile
spring.security.oauth2.client.registration.facebook.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.provider.facebook.authorization-uri=https://www.facebook.com/v18.0/dialog/oauth
spring.security.oauth2.client.provider.facebook.token-uri=https://graph.facebook.com/v18.0/oauth/access_token
spring.security.oauth2.client.provider.facebook.user-info-uri=https://graph.facebook.com/v18.0/me?fields=id,name,email,first_name,last_name
spring.security.oauth2.client.provider.facebook.user-name-attribute=id

# GitHub OAuth2
spring.security.oauth2.client.registration.github.client-id=${GH_OAUTH_CLIENT_ID:YOUR_GITHUB_CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret=${GH_OAUTH_CLIENT_SECRET:YOUR_GH_OAUTH_CLIENT_SECRET}
spring.security.oauth2.client.registration.github.scope=read:user,user:email
spring.security.oauth2.client.registration.github.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.provider.github.authorization-uri=https://github.com/login/oauth/authorize
spring.security.oauth2.client.provider.github.token-uri=https://github.com/login/oauth/access_token
spring.security.oauth2.client.provider.github.user-info-uri=https://api.github.com/user
spring.security.oauth2.client.provider.github.user-name-attribute=id

# ============================================
# SPRING ACTUATOR - Performance Monitoring
# ============================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.metrics.enabled=true
management.endpoint.health.show-details=when-authorized

# Mail health check devre dışı — SMTP bağlantısı yokken pod crash'i önler
# Mail hesapları DB'de yönetilir (mail_accounts), Spring auto-config SMTP kullanılmaz
management.health.mail.enabled=false

# HTTP Server Request Metrics
management.metrics.enable.http.server.requests=true
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.sla.http.server.requests=100ms,500ms,1s,2s,5s

# HikariCP Connection Pool Metrics
management.metrics.enable.hikaricp=true

# JVM Metrics
management.metrics.enable.jvm=true
management.metrics.enable.process=true
management.metrics.enable.system=true

# ============================================
# REDIS CACHE (Tenant-Aware)
# ============================================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=2

# ============================================
# DISTRIBUTED TRACING - Zipkin
# ============================================
management.zipkin.tracing.endpoint=${ZIPKIN_URL:http://localhost:9411}/api/v2/spans
management.tracing.sampling.probability=1.0

# logging.level.org.springframework.cache=TRACE

# ============================================
# RABBITMQ CONFIGURATION
# ============================================
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
# Broker yokken retry aralığı: 30sn (default 5sn — log gürültüsünü azaltır)
spring.rabbitmq.listener.simple.recovery-interval=30000

# RabbitMQ Management HTTP API (panel admin proxy icin)
rabbitmq.mgmt.url=${RABBITMQ_MGMT_URL:http://localhost:15672/api}
rabbitmq.mgmt.vhost=${RABBITMQ_VHOST:/}
rabbitmq.mgmt.connect-timeout-ms=${RABBITMQ_MGMT_CONNECT_TIMEOUT:2000}
rabbitmq.mgmt.read-timeout-ms=${RABBITMQ_MGMT_READ_TIMEOUT:5000}

# ============================================
# MAIL CONFIGURATION (DB-Based — Mail+Form v2)
# ============================================
# MailSenderAutoConfiguration EllyApplication'da exclude'dur (pod crash onlemi).
# SMTP bilgileri tamamen DB'de (mail_accounts tablosu) tutulur. Her tenant
# birden fazla mail hesabi olusturabilir; form yaratirken senderMailAccountId
# ile hangi hesabin kullanilacagi secilir.
#
# Sifre guvenligi: smtp_password AES-256-CBC ile sifrelenir (AesEncryptor).
# AES_SECRET_KEY tam 32 ASCII karakter olmalidir.

aes.secret-key=${AES_SECRET_KEY:12345678901234567890123456789012}

# ============================================
# THYMELEAF CONFIGURATION
# ============================================
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=true