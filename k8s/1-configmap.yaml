# ============================================
# CONFIGMAP - Hassas Olmayan Konfigürasyon
# ============================================
# Veritabanı host/port, Spring profil ayarları, genel konfigürasyon
apiVersion: v1
kind: ConfigMap
metadata:
  name: elly-config
  namespace: elly
  labels:
    app: elly-cms
    component: config
data:
  # --- Spring Configuration ---
  SPRING_PROFILES_ACTIVE: "prod"
  SERVER_PORT: "8080"
  APP_TIMEZONE: "Europe/Istanbul"

  # --- JPA/Hibernate DDL Strategy ---
  # Prod'da "validate": Hibernate sadece schema'yi dogrular, ALTER TABLE yapmaz.
  # Schema degisiklikleri migration SQL'leri ile manuel uygulanir.
  # Lokal gelistirmede application.properties default'u "update" kalir.
  JPA_DDL_AUTO: "validate"

  # --- Default Tenant ---
  DEFAULT_TENANT: "basedb"

  # --- Base Database ---
  BASEDB_HOST: "postgres-basedb"
  BASEDB_PORT: "5432"
  BASEDB_NAME: "elly_basedb"
  BASEDB_SCHEMA: "public"

  # --- Tenant 1 Database ---
  TENANT1_DB_HOST: "postgres-tenant1"
  TENANT1_DB_PORT: "5432"
  TENANT1_DB_NAME: "elly_tenant1"
  TENANT1_DB_SCHEMA: "public"

  # --- Tenant 2 Database ---
  TENANT2_DB_HOST: "postgres-tenant2"
  TENANT2_DB_PORT: "5432"
  TENANT2_DB_NAME: "elly_tenant2"
  TENANT2_DB_SCHEMA: "public"

  # --- Redis Cache ---
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"

  # --- RabbitMQ ---
  RABBITMQ_HOST: "rabbitmq"
  RABBITMQ_PORT: "5672"

  # --- Mail SMTP (Mail+Form v2) ---
  # v2'de SMTP host/port/username/password ENV ya da ConfigMap'te DEGIL, her
  # tenant DB'sindeki mail_accounts tablosunda saklanir (panel uzerinden eklenir).
  # Secret'ta sadece AES_SECRET_KEY bulunur — smtp_password AES-256-CBC ile
  # sifrelenmis halde DB'de durur, run-time'da decrypt edilir. ConfigMap'te
  # non-sensitive mail ayari yoktur; default/fallback kullanilmaz.

  # --- Zipkin Tracing ---
  ZIPKIN_URL: "http://zipkin:9411"

  # --- Logging ---
  LOGGING_LEVEL_ROOT: "INFO"
  LOGGING_LEVEL_COM_CMS: "INFO"

  # --- Prometheus Metrics Tag ---
  MANAGEMENT_METRICS_TAGS_APPLICATION: "elly"

  # --- Cookie ---
  COOKIE_SECURE: "true"

  # --- OAuth2 Redirect ---
  OAUTH2_REDIRECT_URI: "https://your-domain.com/oauth2/redirect"

---
# ============================================
# CONFIGMAP - PostgreSQL Tenant 1
# ============================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-tenant1-config
  namespace: elly
  labels:
    app: elly-cms
    component: database
    tenant: tenant1
data:
  POSTGRES_DB: "elly_tenant1"
  PGDATA: "/var/lib/postgresql/data/pgdata"
  POSTGRES_INITDB_ARGS: "-E UTF8 --locale=en_US.UTF-8"
  # PostgreSQL ilk açılışta bu SQL'i otomatik çalıştırır
  init.sql: |
    CREATE SCHEMA IF NOT EXISTS public;

---
