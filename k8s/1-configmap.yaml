# ============================================
# CONFIGMAP - Hassas Olmayan Konfigürasyon
# ============================================
# Veritabanı host/port, Spring profil ayarları, genel konfigürasyon
apiVersion: v1
kind: ConfigMap
metadata:
  name: elly-config
  namespace: elly
  labels:
    app: elly-cms
    component: config
data:
  # --- Spring Configuration ---
  SPRING_PROFILES_ACTIVE: "prod"
  SERVER_PORT: "8080"
  APP_TIMEZONE: "Europe/Istanbul"

  # --- Default Tenant ---
  DEFAULT_TENANT: "basedb"

  # --- Base Database ---
  BASEDB_HOST: "postgres-basedb"
  BASEDB_PORT: "5432"
  BASEDB_NAME: "elly_basedb"
  BASEDB_SCHEMA: "public"

  # --- Tenant 1 Database ---
  TENANT1_DB_HOST: "postgres-tenant1"
  TENANT1_DB_PORT: "5432"
  TENANT1_DB_NAME: "elly_tenant1"
  TENANT1_DB_SCHEMA: "public"

  # --- Tenant 2 Database ---
  TENANT2_DB_HOST: "postgres-tenant2"
  TENANT2_DB_PORT: "5432"
  TENANT2_DB_NAME: "elly_tenant2"
  TENANT2_DB_SCHEMA: "public"

  # --- Redis Cache ---
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"

  # --- RabbitMQ ---
  RABBITMQ_HOST: "rabbitmq"
  RABBITMQ_PORT: "5672"

  # --- Mail SMTP ---
  MAIL_HOST: "smtp.gmail.com"
  MAIL_PORT: "587"
  MAIL_SMTP_AUTH: "true"
  MAIL_SMTP_STARTTLS: "true"
  MAIL_FROM: "noreply@huseyindol.com"

  # --- Zipkin Tracing ---
  ZIPKIN_URL: "http://zipkin:9411"

  # --- Logging ---
  LOGGING_LEVEL_ROOT: "INFO"
  LOGGING_LEVEL_COM_CMS: "INFO"

  # --- Prometheus Metrics Tag ---
  MANAGEMENT_METRICS_TAGS_APPLICATION: "elly"

  # --- Cookie ---
  COOKIE_SECURE: "true"

  # --- OAuth2 Redirect ---
  OAUTH2_REDIRECT_URI: "https://your-domain.com/oauth2/redirect"

---
# ============================================
# CONFIGMAP - PostgreSQL Tenant 1
# ============================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-tenant1-config
  namespace: elly
  labels:
    app: elly-cms
    component: database
    tenant: tenant1
data:
  POSTGRES_DB: "elly_tenant1"
  PGDATA: "/var/lib/postgresql/data/pgdata"
  POSTGRES_INITDB_ARGS: "-E UTF8 --locale=en_US.UTF-8"
  # PostgreSQL ilk açılışta bu SQL'i otomatik çalıştırır
  init.sql: |
    CREATE SCHEMA IF NOT EXISTS public;

---
# ============================================
# CONFIGMAP - PostgreSQL Tenant 2
# ============================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-tenant2-config
  namespace: elly
  labels:
    app: elly-cms
    component: database
    tenant: tenant2
data:
  POSTGRES_DB: "elly_tenant2"
  PGDATA: "/var/lib/postgresql/data/pgdata"
  POSTGRES_INITDB_ARGS: "-E UTF8 --locale=en_US.UTF-8"
  # PostgreSQL ilk açılışta bu SQL'i otomatik çalıştırır
  init.sql: |
    CREATE SCHEMA IF NOT EXISTS public;

---
# ============================================
# CONFIGMAP - PostgreSQL BaseDB
# ============================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-basedb-config
  namespace: elly
  labels:
    app: elly-cms
    component: database
    tenant: basedb
data:
  POSTGRES_DB: "elly_basedb"
  PGDATA: "/var/lib/postgresql/data/pgdata"
  POSTGRES_INITDB_ARGS: "-E UTF8 --locale=en_US.UTF-8"
  init.sql: |
    CREATE SCHEMA IF NOT EXISTS public;
