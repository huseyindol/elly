# ============================================
# CRONJOB - PostgreSQL Otomatik Backup
# ============================================
# Her gece 03:00'da (Europe/Istanbul) basedb + her iki tenant DB'sini yedekler.
# Backup'lar gzip ile sıkıştırılır. 3 günden eski backup'lar otomatik silinir.
#
# ÖNEMLİ: Her DB'nin ŞİFRESİ FARKLI olabilir → her pg_dump kendi
# postgres-<db>-secret'indeki POSTGRES_USER/POSTGRES_PASSWORD ile bağlanır.
# Hata olursa (auth vb.) boş dosya YAZILMAZ ve job hata ile biter (sessiz başarısızlık yok).
#
# Manuel backup:
#   kubectl create job --from=cronjob/postgres-backup manual-backup-$(date +%s) -n elly
# Logları:    kubectl logs -n elly job/<job-adı>
# Geri yükleme:
#   kubectl cp elly/<backup-pod>:/backups/basedb-2026-03-05.sql.gz ./restore.sql.gz
#   gunzip restore.sql.gz
#   kubectl exec -i postgres-basedb-0 -n elly -- psql -U postgres -d elly_basedb < restore.sql
apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
  namespace: elly
  labels:
    app: elly-cms
    component: backup
spec:
  # Her gece 03:00 (UTC+3 = 00:00 UTC)
  schedule: "0 0 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  startingDeadlineSeconds: 100
  jobTemplate:
    spec:
      activeDeadlineSeconds: 600
      backoffLimit: 1
      template:
        metadata:
          labels:
            app: elly-cms
            component: backup
        spec:
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: postgres:16-alpine
              command:
                - /bin/sh
                - -c
                - |
                  echo "=========================================="
                  echo "Backup başlatılıyor: $(date)"
                  echo "=========================================="
                  DATE=$(date +%Y-%m-%d_%H%M)
                  FAILED=0

                  # $1 label, $2 host, $3 user, $4 dbname, $5 password
                  dump_db() {
                    LABEL="$1"; HOST="$2"; DBUSER="$3"; DBNAME="$4"; DBPASS="$5"
                    TMP="/backups/.dump-${LABEL}.sql"
                    echo "  → ${LABEL} (${DBNAME}) yedekleniyor..."
                    if PGPASSWORD="$DBPASS" pg_dump -h "$HOST" -U "$DBUSER" -d "$DBNAME" \
                         --no-owner --no-privileges > "$TMP" 2>/tmp/err; then
                      gzip -c "$TMP" > "/backups/${LABEL}-${DATE}.sql.gz"
                      rm -f "$TMP"
                      SIZE=$(du -h "/backups/${LABEL}-${DATE}.sql.gz" | cut -f1)
                      echo "    ✅ ${LABEL} OK: ${LABEL}-${DATE}.sql.gz (${SIZE})"
                    else
                      echo "    ❌ ${LABEL} BAŞARISIZ: $(cat /tmp/err)"
                      rm -f "$TMP"
                      FAILED=1
                    fi
                  }

                  echo "[1/5] BaseDB"
                  dump_db basedb  postgres-basedb  "$BASEDB_USER"  "$BASEDB_NAME"     "$BASEDB_PASSWORD"
                  echo "[2/5] Tenant 1"
                  dump_db tenant1 postgres-tenant1 "$TENANT1_USER" "$TENANT1_DB_NAME" "$TENANT1_PASSWORD"
                  echo "[3/5] Tenant 2"
                  dump_db tenant2 postgres-tenant2 "$TENANT2_USER" "$TENANT2_DB_NAME" "$TENANT2_PASSWORD"

                  echo "[4/5] 3 günden eski backup'lar siliniyor..."
                  DELETED=$(find /backups/ -name "*.sql.gz" -mtime +3 -print -delete | wc -l)
                  echo "    🗑️  ${DELETED} eski backup silindi"

                  echo "[5/5] Mevcut backup'lar:"
                  ls -lh /backups/*.sql.gz 2>/dev/null || echo "    Backup bulunamadı!"
                  echo "Toplam backup boyutu: $(du -sh /backups/ | cut -f1)"
                  echo "=========================================="
                  if [ "$FAILED" -ne 0 ]; then
                    echo "⚠️  EN AZ BİR DB YEDEĞİ BAŞARISIZ — job hata ile bitiyor (boş dosya yazılmadı)."
                    exit 1
                  fi
                  echo "Backup tamamlandı: $(date)"
                  echo "=========================================="
              env:
                # --- BaseDB (kendi secret'i) ---
                - name: BASEDB_USER
                  valueFrom:
                    secretKeyRef:
                      name: postgres-basedb-secret
                      key: POSTGRES_USER
                - name: BASEDB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: postgres-basedb-secret
                      key: POSTGRES_PASSWORD
                - name: BASEDB_NAME
                  valueFrom:
                    configMapKeyRef:
                      name: elly-config
                      key: BASEDB_NAME
                # --- Tenant 1 (kendi secret'i) ---
                - name: TENANT1_USER
                  valueFrom:
                    secretKeyRef:
                      name: postgres-tenant1-secret
                      key: POSTGRES_USER
                - name: TENANT1_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: postgres-tenant1-secret
                      key: POSTGRES_PASSWORD
                - name: TENANT1_DB_NAME
                  valueFrom:
                    configMapKeyRef:
                      name: elly-config
                      key: TENANT1_DB_NAME
                # --- Tenant 2 (kendi secret'i) ---
                - name: TENANT2_USER
                  valueFrom:
                    secretKeyRef:
                      name: postgres-tenant2-secret
                      key: POSTGRES_USER
                - name: TENANT2_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: postgres-tenant2-secret
                      key: POSTGRES_PASSWORD
                - name: TENANT2_DB_NAME
                  valueFrom:
                    configMapKeyRef:
                      name: elly-config
                      key: TENANT2_DB_NAME
              resources:
                requests:
                  cpu: "50m"
                  memory: "64Mi"
                limits:
                  cpu: "200m"
                  memory: "128Mi"
              volumeMounts:
                - name: backup-storage
                  mountPath: /backups
          volumes:
            - name: backup-storage
              persistentVolumeClaim:
                claimName: postgres-backup-pvc

---
# ============================================
# PVC - Backup Depolama Alanı
# ============================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-backup-pvc
  namespace: elly
  labels:
    app: elly-cms
    component: backup
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 1Gi
