# ============================================
# INGRESS - Dış Trafik Yönlendirmesi
# ============================================
# K3s varsayılan olarak Traefik Ingress Controller ile gelir.
# Ekstra kurulum gerekmez!
#
# Eğer NGINX Ingress tercih edersen:
#   1. K3s'i Traefik olmadan kur: curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="--disable=traefik" sh -
#   2. NGINX Ingress kur: kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/main/deploy/static/provider/baremetal/deploy.yaml
#   3. Aşağıdaki ingressClassName'i "nginx" olarak değiştir
#
# TLS/SSL için cert-manager önerilir:
#   kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.14.4/cert-manager.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: elly-ingress
  namespace: elly
  labels:
    app: elly-cms
  annotations:
    # Traefik Ingress Controller ayarları (K3s default)
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure

    # Rate limiting - Traefik middleware ile yapılır (aşağıda tanımlı)
    # DDoS koruması için Traefik middleware oluşturabilirsin.

    # CORS ayarları - middleware oluşturulunca aktif edilecek
    # traefik.ingress.kubernetes.io/router.middlewares: elly-cors@kubernetescrd

    # SSL - cert-manager ile otomatik SSL sertifikası
    traefik.ingress.kubernetes.io/router.tls: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: traefik
  # TLS Config for cert-manager
  tls:
    - hosts:
        - api.huseyindol.com
      secretName: elly-tls-secret
  rules:
    - host: api.huseyindol.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: elly-app-service
                port:
                  number: 8080
          - path: /swagger-ui
            pathType: Prefix
            backend:
              service:
                name: elly-app-service
                port:
                  number: 8080
          - path: /api-docs
            pathType: Prefix
            backend:
              service:
                name: elly-app-service
                port:
                  number: 8080
          - path: /actuator
            pathType: Prefix
            backend:
              service:
                name: elly-app-service
                port:
                  number: 8080
          - path: /login/oauth2
            pathType: Prefix
            backend:
              service:
                name: elly-app-service
                port:
                  number: 8080
          - path: /oauth2
            pathType: Prefix
            backend:
              service:
                name: elly-app-service
                port:
                  number: 8080
          - path: /assets
            pathType: Prefix
            backend:
              service:
                name: elly-app-service
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: elly-app-service
                port:
                  number: 8080
