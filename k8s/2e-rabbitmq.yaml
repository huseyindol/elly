# ============================================
# RabbitMQ — ConfigMap (rabbitmq.conf)
# ============================================
# RabbitMQ 3.13+ deprecated ENV'leri reddediyor (RABBITMQ_VM_MEMORY_HIGH_WATERMARK vb.)
# Bellek/disk limitleri conf dosyasi ile verilir.
apiVersion: v1
kind: ConfigMap
metadata:
  name: rabbitmq-config
  namespace: elly
  labels:
    app: rabbitmq
    component: messaging
data:
  rabbitmq.conf: |
    # Container limit 768Mi — Erlang VM en fazla ~%40 kullanir (OOM onleme)
    vm_memory_high_watermark.relative = 0.4
    disk_free_limit.absolute = 200MB

---
# ============================================
# RabbitMQ StatefulSet
# ============================================
# 4GB VM: management plugin + Erlang VM icin 512Mi limit yetersiz kaliyordu
# (OOM / readiness probe timeout → restart dongusu).
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rabbitmq
  namespace: elly
  labels:
    app: rabbitmq
    component: messaging
spec:
  serviceName: rabbitmq
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
        component: messaging
    spec:
      containers:
      - name: rabbitmq
        image: rabbitmq:3.13-management-alpine
        ports:
        - containerPort: 5672
          name: amqp
        - containerPort: 15672
          name: management
        env:
        - name: RABBITMQ_DEFAULT_USER
          valueFrom:
            secretKeyRef:
              name: elly-secret
              key: RABBITMQ_USER
        - name: RABBITMQ_DEFAULT_PASS
          valueFrom:
            secretKeyRef:
              name: elly-secret
              key: RABBITMQ_PASSWORD
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "768Mi"
        startupProbe:
          exec:
            command: ["rabbitmq-diagnostics", "-q", "ping"]
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 10
          failureThreshold: 30
        livenessProbe:
          exec:
            command: ["rabbitmq-diagnostics", "-q", "ping"]
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 5
        readinessProbe:
          exec:
            command: ["rabbitmq-diagnostics", "-q", "ping"]
          initialDelaySeconds: 20
          periodSeconds: 15
          timeoutSeconds: 10
          failureThreshold: 6
        volumeMounts:
        - name: rabbitmq-data
          mountPath: /var/lib/rabbitmq
        - name: rabbitmq-config
          mountPath: /etc/rabbitmq/rabbitmq.conf
          subPath: rabbitmq.conf
          readOnly: true
      volumes:
      - name: rabbitmq-config
        configMap:
          name: rabbitmq-config
  volumeClaimTemplates:
  - metadata:
      name: rabbitmq-data
      namespace: elly
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: local-path
      resources:
        requests:
          storage: 1Gi

---
# ============================================
# RabbitMQ Headless Service (StatefulSet DNS)
# ============================================
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: elly
  labels:
    app: rabbitmq
    component: messaging
spec:
  selector:
    app: rabbitmq
  clusterIP: None
  ports:
  - name: amqp
    port: 5672
    targetPort: 5672

---
# ============================================
# RabbitMQ Management UI Service (NodePort)
# ============================================
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-management
  namespace: elly
  labels:
    app: rabbitmq
    component: messaging
spec:
  selector:
    app: rabbitmq
  type: NodePort
  ports:
  - name: management
    port: 15672
    targetPort: 15672
    nodePort: 31672

---
# ============================================
# RabbitMQ AMQP NodePort (lokal geliştirme için)
# ============================================
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-amqp
  namespace: elly
  labels:
    app: rabbitmq
    component: messaging
spec:
  selector:
    app: rabbitmq
  type: NodePort
  ports:
  - name: amqp
    port: 5672
    targetPort: 5672
    nodePort: 31673
