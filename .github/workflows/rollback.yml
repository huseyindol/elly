# ============================================
# GitHub Actions - Rollback Deployment
# ============================================
# Manuel tetiklenir: Actions → Rollback → Run workflow
# Eski bir image tag'i girerek önceki versiyona dönersin.
#
# Tag bilgisi:
#   - GHCR'da mevcut tag'leri görmek için:
#     GitHub → Packages → elly → tüm versiyonlar
#   - Her deploy, commit SHA'nın ilk 7 karakteri ile taglanır
#     Örnek: abc1234
#   - 'latest' tag'i her zaman son başarılı deploy'u gösterir
name: 🔙 Rollback Deployment

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Geri dönülecek image tag (commit SHA ilk 7 karakter, ör: abc1234)'
        required: true
        type: string
      reason:
        description: 'Rollback sebebi (opsiyonel)'
        required: false
        type: string
        default: 'Manual rollback'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  rollback:
    name: 🔙 Rollback to ${{ inputs.image_tag }}
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: 🔍 Rollback bilgileri
        run: |
          echo "🔙 Rollback başlatılıyor..."
          echo "   Tag: ${{ inputs.image_tag }}"
          echo "   Sebep: ${{ inputs.reason }}"
          echo "   Tetikleyen: ${{ github.actor }}"
          echo "   Zaman: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"

      - name: 🔙 Rollback on Server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
            TAG="${{ inputs.image_tag }}"

            echo "🔙 Rolling back to ${IMAGE}:${TAG}..."

            # Mevcut image'ı kaydet (log için)
            CURRENT=$(sudo kubectl get deployment elly-app -n elly \
              -o jsonpath='{.spec.template.spec.containers[0].image}')
            echo "📍 Current image: ${CURRENT}"

            # Rollback yap
            sudo kubectl set image deployment/elly-app \
              elly-app=${IMAGE}:${TAG} \
              -n elly

            # Rollout durumunu takip et
            echo "⏳ Waiting for rollout..."
            sudo kubectl rollout status deployment/elly-app -n elly --timeout=180s

            echo "✅ Rollback completed!"
            echo "   From: ${CURRENT}"
            echo "   To:   ${IMAGE}:${TAG}"

            # Pod durumlarını göster
            sudo kubectl get pods -n elly -l component=backend
