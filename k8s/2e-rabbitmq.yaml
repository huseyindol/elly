# ============================================
# RabbitMQ StatefulSet
# ============================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rabbitmq
  namespace: elly
  labels:
    app: rabbitmq
    component: messaging
spec:
  serviceName: rabbitmq
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
        component: messaging
    spec:
      containers:
      - name: rabbitmq
        image: rabbitmq:3.13-management-alpine
        ports:
        - containerPort: 5672
          name: amqp
        - containerPort: 15672
          name: management
        env:
        - name: RABBITMQ_DEFAULT_USER
          valueFrom:
            secretKeyRef:
              name: elly-secret
              key: RABBITMQ_USER
        - name: RABBITMQ_DEFAULT_PASS
          valueFrom:
            secretKeyRef:
              name: elly-secret
              key: RABBITMQ_PASSWORD
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        livenessProbe:
          exec:
            command: ["rabbitmq-diagnostics", "ping"]
          initialDelaySeconds: 30
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          exec:
            command: ["rabbitmq-diagnostics", "check_port_connectivity"]
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        volumeMounts:
        - name: rabbitmq-data
          mountPath: /var/lib/rabbitmq
  volumeClaimTemplates:
  - metadata:
      name: rabbitmq-data
      namespace: elly
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: local-path
      resources:
        requests:
          storage: 1Gi

---
# ============================================
# RabbitMQ Headless Service (StatefulSet DNS)
# ============================================
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: elly
  labels:
    app: rabbitmq
    component: messaging
spec:
  selector:
    app: rabbitmq
  clusterIP: None
  ports:
  - name: amqp
    port: 5672
    targetPort: 5672

---
# ============================================
# RabbitMQ Management UI Service (NodePort)
# ============================================
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-management
  namespace: elly
  labels:
    app: rabbitmq
    component: messaging
spec:
  selector:
    app: rabbitmq
  type: NodePort
  ports:
  - name: management
    port: 15672
    targetPort: 15672
    nodePort: 31672
