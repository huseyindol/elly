# ============================================
# GitHub Actions - Build & Deploy to K3s
# ============================================
# main branch'e push olunca tetiklenir:
# 1. Maven ile test & build
# 2. Docker image build & GHCR'a push
# 3. SSH ile GCP VM'e bağlanıp k3s deployment güncelle
#
# Gerekli GitHub Secrets:
#   SERVER_HOST, SERVER_USER, SERVER_SSH_KEY,
#   TENANT1_DB_USER, TENANT1_DB_PASSWORD,
#   TENANT2_DB_USER, TENANT2_DB_PASSWORD,
#   JWT_SECRET, JWT_ENCRYPTION_SECRET,
#   GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET,
#   FACEBOOK_CLIENT_ID, FACEBOOK_CLIENT_SECRET,
#   GH_OAUTH_CLIENT_ID, GH_OAUTH_CLIENT_SECRET,
#   REDIS_PASSWORD, RABBITMQ_USER, RABBITMQ_PASSWORD,
#   EMAIL_API_KEY,
#   # Mail+Form v2 — SMTP DB'de; sadece AES-256 anahtari ENV'de
#   AES_SECRET_KEY  (32 ASCII karakter — smtp_password sifreleme anahtari)
name: 🚀 Build & Deploy

on:
  push:
    branches: [main]

# Aynı anda birden fazla deploy çalışmasını engelle
concurrency:
  group: deploy-production
  cancel-in-progress: false

# GITHUB_TOKEN'a GHCR yazma izni ver
permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ==========================================
  # Job 1: Build & Test
  # ==========================================
  build:
    name: 🔨 Build & Test
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      short_sha: ${{ steps.vars.outputs.short_sha }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v5

      - name: ☕ Setup Java 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: 📦 Maven Build
        run: mvn clean package -B -DskipTests

      - name: 🔑 Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Set short SHA
        id: vars
        run: echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: � Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: �🐳 Build & Push Docker Image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.short_sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==========================================
  # Job 2: Deploy to K3s
  # ==========================================
  deploy:
    name: 🚀 Deploy to K3s
    needs: build
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v5

      - name: 📝 Generate Secrets YAML
        run: |
          # Secret değerleri base64 encode et
          export TENANT1_DB_USER_B64=$(echo -n "${{ secrets.TENANT1_DB_USER }}" | base64)
          export TENANT1_DB_PASSWORD_B64=$(echo -n "${{ secrets.TENANT1_DB_PASSWORD }}" | base64)
          export TENANT2_DB_USER_B64=$(echo -n "${{ secrets.TENANT2_DB_USER }}" | base64)
          export TENANT2_DB_PASSWORD_B64=$(echo -n "${{ secrets.TENANT2_DB_PASSWORD }}" | base64)
          export JWT_SECRET_B64=$(echo -n "${{ secrets.JWT_SECRET }}" | base64)
          export JWT_ENCRYPTION_SECRET_B64=$(echo -n "${{ secrets.JWT_ENCRYPTION_SECRET }}" | base64)
          export GOOGLE_CLIENT_ID_B64=$(echo -n "${{ secrets.GOOGLE_CLIENT_ID }}" | base64)
          export GOOGLE_CLIENT_SECRET_B64=$(echo -n "${{ secrets.GOOGLE_CLIENT_SECRET }}" | base64)
          export FACEBOOK_CLIENT_ID_B64=$(echo -n "${{ secrets.FACEBOOK_CLIENT_ID }}" | base64)
          export FACEBOOK_CLIENT_SECRET_B64=$(echo -n "${{ secrets.FACEBOOK_CLIENT_SECRET }}" | base64)
          export GH_OAUTH_CLIENT_ID_B64=$(echo -n "${{ secrets.GH_OAUTH_CLIENT_ID }}" | base64)
          export GH_OAUTH_CLIENT_SECRET_B64=$(echo -n "${{ secrets.GH_OAUTH_CLIENT_SECRET }}" | base64)
          export EMAIL_API_KEY_B64=$(echo -n "${{ secrets.EMAIL_API_KEY }}" | base64)
          export REDIS_PASSWORD_B64=$(echo -n "${{ secrets.REDIS_PASSWORD }}" | base64)
          export RABBITMQ_USER_B64=$(echo -n "${{ secrets.RABBITMQ_USER }}" | base64)
          export RABBITMQ_PASSWORD_B64=$(echo -n "${{ secrets.RABBITMQ_PASSWORD }}" | base64)

          # ============================================
          # Mail+Form v2 — AES-256 sifreleme anahtari
          # ============================================
          # v2'de SMTP bilgileri DB'de tutuluyor (mail_accounts tablosu,
          # smtpPassword AES-256-CBC ile sifrelenip yaziliyor). Bu anahtar
          # pod'lara ENV olarak verilir, run-time'da decrypt icin kullanilir.
          # 32 ASCII karakter olmali. Key rotation plansa re-encrypt gerekli.
          export AES_SECRET_KEY_B64=$(echo -n "${{ secrets.AES_SECRET_KEY }}" | base64)

          # Template'i doldur
          envsubst < k8s/1-secret.template.yaml > k8s/1-secret.yaml

      - name: 📤 Deploy to Server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "🚀 Deploying Elly CMS..."
            SHORT_SHA="${{ needs.build.outputs.short_sha }}"
            IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"

            # Deployment var mı kontrol et
            if sudo kubectl get deployment elly-app -n elly > /dev/null 2>&1; then
              echo "📦 Existing deployment found. Updating image..."
              # Image'ı güncelle
              sudo kubectl set image deployment/elly-app \
                elly-app=${IMAGE}:${SHORT_SHA} \
                -n elly

              # Rolling update durumunu takip et
              echo "⏳ Waiting for rollout..."
              sudo kubectl rollout status deployment/elly-app -n elly --timeout=180s
            else
              echo "🆕 First deployment detected!"
              echo "⚠️  Please run the initial K8s setup on the server first."
              echo "   See deployment guide for 'Aşama 5: Sunucu İlk Kurulumu'"
              exit 1
            fi

            echo "✅ Deploy completed! Image: ${IMAGE}:${SHORT_SHA}"

            # Pod durumlarını göster
            sudo kubectl get pods -n elly -l component=backend
